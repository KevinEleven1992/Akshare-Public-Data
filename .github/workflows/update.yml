name: Daily Finance Data Update

on:
  schedule:
    # Cron 表达式使用 UTC 时间。北京时间 20:30 = UTC 12:30
    # 预留半小时给数据抓取和部署，确保21:00准时上线最新数据
    - cron: '30 12 * * *' 
  workflow_dispatch: # 允许手动在 GitHub 页面点击按钮触发运行

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install akshare yfinance pandas

      - name: Fetch Latest Data
        run: python fetch_data.py

      - name: Commit and Push Data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/data.json
          # 如果有更改才提交，避免空提交报错
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Auto-Update Data [skip ci]" && git push)
