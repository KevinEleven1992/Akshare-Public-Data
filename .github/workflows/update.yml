name: 每日宏观数据更新

on:
  schedule:
    # 北京时间 21:00 = UTC 13:00
    - cron: '0 13 * * *'
  workflow_dispatch:  # 手动触发，便于调试

permissions:
  contents: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install akshare pandas --upgrade

      - name: 运行采集脚本
        run: |
          python scripts/fetch_data.py

      - name: 提交并推送数据
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          git commit -m "chore: update macro data $(date -u +'%Y-%m-%d 21:00 BJT')" || echo "no changes"
          git push

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
