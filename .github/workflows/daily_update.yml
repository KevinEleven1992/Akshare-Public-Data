name: Daily Macro Data Update

on:
  schedule:
    # 每天北京时间晚上 21:00 运行 (UTC 时间 13:00)
    - cron: '0 13 * * *'
  workflow_dispatch: # 允许手动点击按钮运行测试

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      # 【已修复】升级到 v4，支持最新 Node 环境
      uses: actions/checkout@v4

    - name: Set up Python
      # 【已修复】升级到 v5，支持最新 Node 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install akshare pandas

    - name: Run Data Fetch Script
      run: python update_data.py

    - name: Commit and Push Data
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add data.json
        # 如果数据没有变化，就不提交，避免报错
        git diff --quiet && git diff --staged --quiet || (git commit -m "自动更新每日数据" && git push)
