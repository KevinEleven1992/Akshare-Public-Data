<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日宏观数据看板</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    body { font-family: -apple-system, "PingFang SC", sans-serif; margin: 0; background: #f5f6fa; }
    .header { background: #1a1a2e; color: #fff; padding: 20px; text-align: center; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 16px; }
    .card { background: #fff; border-radius: 8px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .card h3 { margin: 0 0 8px; font-size: 16px; color: #333; border-left: 4px solid #1a73e8; padding-left: 8px; }
    .chart { width: 100%; height: 240px; }
    .update-time { color: #888; font-size: 13px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    td, th { padding: 6px 8px; border-bottom: 1px solid #eee; text-align: center; }
  </style>
</head>
<body>
  <div class="header">
    <h1>每日宏观数据看板</h1>
    <div class="update-time" id="updateTime">加载中...</div>
  </div>
  <div class="container">
    <div class="grid">
      <div class="card"><h3>央行逆回购日历(7天历史+14天到期)</h3><div id="repoCal"></div></div>
      <div class="card"><h3>人民币汇率(CNY/CNH)</h3><div id="fxChart" class="chart"></div></div>
      <div class="card"><h3>中信期货 IF 多空持仓</h3><div id="cotChart" class="chart"></div></div>
      <div class="card"><h3>A股两融余额</h3><div id="marginChart" class="chart"></div></div>
      <div class="card"><h3>中美国债收益率</h3><div id="rateChart" class="chart"></div></div>
      <div class="card"><h3>黄金/原油</h3><div id="commChart" class="chart"></div></div>
      <div class="card"><h3>中国 CPI/PPI/PMI</h3><div id="cnMacroChart" class="chart"></div></div>
      <div class="card"><h3>美国 CPI/非农/失业率</h3><div id="usMacroChart" class="chart"></div></div>
      <div class="card"><h3>中国 M1/M2 同比</h3><div id="moneyChart" class="chart"></div></div>
    </div>
  </div>

<script>
const BASE = window.location.pathname.replace(/\/$/, '');
fetch(`${BASE}/data/latest.json`)
  .then(r => r.json())
  .then(data => {
    document.getElementById('updateTime').textContent = '更新时间: ' + data.update_time;
    renderRepoCal(data.repo_calendar);
    renderChart('fxChart', data.fx, '日期', '汇率');
    renderChart('marginChart', data.margin.sse, '日期', '融资余额');
    renderChart('rateChart', data.rates, '日期', '收益率');
    renderChart('commChart', data.commodities.gold, '日期', '价格');
    renderMoneyChart(data.macro_china.money_supply);
    // 其余图表按需补充...
  })
  .catch(e => {
    document.getElementById('updateTime').textContent = '加载失败: ' + e;
  });

function renderRepoCal(cal) {
  let html = '<table><tr><th>日期</th><th>类型</th><th>操作(亿)</th><th>到期(亿)</th></tr>';
  cal.forEach(d => {
    html += `<tr><td>${d.date}</td><td>${d.type}</td><td>${d.operation||'-'}</td><td>${d.maturity||'-'}</td></tr>`;
  });
  html += '</table>';
  document.getElementById('repoCal').innerHTML = html;
}

function renderChart(id, arr, xKey, yKey) {
  if (!arr || !arr.length) return;
  const chart = echarts.init(document.getElementById(id));
  chart.setOption({
    tooltip: { trigger: 'axis' },
    xAxis: { type: 'category', data: arr.map(r => r[xKey]) },
    yAxis: { type: 'value' },
    series: [{ type: 'line', smooth: true, data: arr.map(r => Object.values(r)[1]) }],
  });
}

function renderMoneyChart(arr) {
  if (!arr) return;
  const chart = echarts.init(document.getElementById('moneyChart'));
  chart.setOption({
    tooltip: { trigger: 'axis' },
    legend: { data: ['M2同比', 'M1同比'] },
    xAxis: { type: 'category', data: arr.map(r => r['月份']) },
    yAxis: { type: 'value' },
    series: [
      { name: 'M2同比', type: 'line', data: arr.map(r => r['M2同比']) },
      { name: 'M1同比', type: 'line', data: arr.map(r => r['M1同比']) },
    ],
  });
}
</script>
</body>
</html>
